<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="'JetBrains Mono', 'SF Mono', 'Menlo', monospace">
  <defs>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="700" fill="url(#bg-grad)"/>
  <rect width="1000" height="700" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="35" fill="white" font-size="18" font-weight="700" text-anchor="middle">QingLian-I — System Architecture</text>
  <text x="500" y="55" fill="#94a3b8" font-size="11" text-anchor="middle">Perception → Decision → Execution Pipeline on Embedded Hardware</text>

  <!-- ========== PERCEPTION LAYER BOX ========== -->
  <rect x="30" y="75" width="300" height="175" rx="10" fill="rgba(8,51,68,0.15)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="45" y="95" fill="#22d3ee" font-size="11" font-weight="600">PERCEPTION — OpenMV Cam H7 Plus</text>

  <!-- Camera Node -->
  <rect x="60" y="110" width="230" height="40" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="175" y="128" fill="white" font-size="11" font-weight="600" text-anchor="middle">OV5640 Camera</text>
  <text x="175" y="142" fill="#94a3b8" font-size="8" text-anchor="middle">QVGA 320×240 @ 30fps</text>

  <!-- AI Detector Node -->
  <rect x="60" y="165" width="230" height="55" rx="6" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="175" y="183" fill="white" font-size="11" font-weight="600" text-anchor="middle">TensorFlow Lite Detector</text>
  <text x="175" y="197" fill="#94a3b8" font-size="8" text-anchor="middle">YOLOv8 → ONNX → TFLite int8</text>
  <text x="175" y="211" fill="#22d3ee" font-size="8" text-anchor="middle">Inference: 20 FPS | Accuracy: 90.27%</text>

  <!-- Camera → Detector Arrow -->
  <line x1="175" y1="150" x2="175" y2="163" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ========== CONTROL LAYER BOX ========== -->
  <rect x="30" y="275" width="940" height="240" rx="10" fill="rgba(6,78,59,0.08)" stroke="#34d399" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="45" y="295" fill="#34d399" font-size="11" font-weight="600">CONTROL — STM32F103C8T6 @ 72 MHz (ARM Cortex-M3)</text>

  <!-- UART Protocol Parser -->
  <rect x="60" y="315" width="200" height="50" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="160" y="336" fill="white" font-size="10" font-weight="600" text-anchor="middle">UART Protocol Parser</text>
  <text x="160" y="352" fill="#94a3b8" font-size="8" text-anchor="middle">Frame: 0xB3...0x5B @ 115200 bps</text>

  <!-- Detector → Parser Arrow -->
  <path d="M 175 220 L 175 250 Q 175 265 190 265 L 260 265 Q 275 265 275 280 L 275 300 Q 275 313 260 313 L 210 313" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <text x="275" y="292" fill="#94a3b8" font-size="8">UART [x,y,dist,class]</text>

  <!-- MPU6050 IMU -->
  <rect x="60" y="385" width="160" height="45" rx="6" fill="rgba(30,27,75,0.5)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="140" y="404" fill="white" font-size="10" font-weight="600" text-anchor="middle">MPU6050 IMU</text>
  <text x="140" y="420" fill="#94a3b8" font-size="8" text-anchor="middle">3-Axis Gyro + Accel · I²C</text>

  <!-- Kalman Filter -->
  <rect x="250" y="385" width="150" height="45" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="325" y="404" fill="white" font-size="10" font-weight="600" text-anchor="middle">Kalman Filter</text>
  <text x="325" y="420" fill="#94a3b8" font-size="8" text-anchor="middle">Attitude Est. ±2°</text>

  <!-- IMU → Kalman Arrow -->
  <line x1="220" y1="407" x2="248" y2="407" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- HC-SR04 Sonar -->
  <rect x="60" y="448" width="160" height="45" rx="6" fill="rgba(30,27,75,0.5)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="140" y="467" fill="white" font-size="10" font-weight="600" text-anchor="middle">HC-SR04 Ultrasonic</text>
  <text x="140" y="483" fill="#94a3b8" font-size="8" text-anchor="middle">Range: 2–200 cm</text>

  <!-- Cascaded PID -->
  <rect x="450" y="375" width="210" height="60" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="2"/>
  <text x="555" y="396" fill="white" font-size="11" font-weight="700" text-anchor="middle">Cascaded PID Controller</text>
  <text x="555" y="412" fill="#94a3b8" font-size="8" text-anchor="middle">Outer: Angle Loop → Inner: Rate Loop</text>
  <text x="555" y="426" fill="#34d399" font-size="8" text-anchor="middle">Update Rate: 1 kHz</text>

  <!-- Parser → PID -->
  <line x1="260" y1="340" x2="448" y2="405" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- Kalman → PID -->
  <line x1="400" y1="407" x2="448" y2="407" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Sonar → PID -->
  <path d="M 160 493 L 160 515 Q 160 530 180 530 L 400 530 Q 420 530 420 510 L 420 460 Q 420 435 448 435" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>

  <!-- ========== COMMUNICATION BOX ========== -->
  <rect x="710" y="310" width="230" height="85" rx="10" fill="rgba(59,7,100,0.15)" stroke="#c084fc" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="725" y="330" fill="#c084fc" font-size="10" font-weight="600">COMMUNICATION</text>

  <!-- Bluetooth -->
  <rect x="730" y="345" width="190" height="38" rx="6" fill="rgba(59,7,100,0.4)" stroke="#c084fc" stroke-width="1.5"/>
  <text x="825" y="360" fill="white" font-size="10" font-weight="600" text-anchor="middle">Bluetooth HC-05</text>
  <text x="825" y="375" fill="#94a3b8" font-size="8" text-anchor="middle">Telemetry + RC · UART Bridge</text>

  <!-- PID ↔ Bluetooth (bidirectional dashed) -->
  <line x1="660" y1="390" x2="728" y2="370" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrow-cyan)"/>
  <line x1="728" y1="380" x2="660" y2="405" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="4,4"/>
  <text x="695" y="365" fill="#c084fc" font-size="7">Status</text>
  <text x="695" y="415" fill="#c084fc" font-size="7">Commands</text>

  <!-- Operator -->
  <rect x="740" y="410" width="170" height="38" rx="6" fill="rgba(15,23,42,0.6)" stroke="#94a3b8" stroke-width="1"/>
  <text x="825" y="425" fill="white" font-size="10" font-weight="600" text-anchor="middle">Operator</text>
  <text x="825" y="440" fill="#94a3b8" font-size="8" text-anchor="middle">Wireless RC / Mobile App</text>

  <line x1="825" y1="383" x2="825" y2="408" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ========== ACTUATION LAYER BOX ========== -->
  <rect x="30" y="540" width="940" height="135" rx="10" fill="rgba(69,26,3,0.1)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="45" y="560" fill="#fbbf24" font-size="11" font-weight="600">ACTUATION — Motor Driver &amp; Mechanical</text>

  <!-- PWM Driver -->
  <rect x="60" y="580" width="200" height="50" rx="6" fill="rgba(69,26,3,0.4)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="160" y="600" fill="white" font-size="10" font-weight="600" text-anchor="middle">L298N Dual H-Bridge</text>
  <text x="160" y="616" fill="#94a3b8" font-size="8" text-anchor="middle">TIM1 PWM @ 20 kHz · Diff. Drive</text>

  <!-- PID → PWM -->
  <path d="M 555 435 L 555 470 Q 555 485 540 485 L 200 485 Q 185 485 185 500 L 185 555 Q 185 578 160 578" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="555" y="520" fill="#94a3b8" font-size="8">PWM Duty Cycle</text>

  <!-- Left Motor -->
  <rect x="360" y="600" width="180" height="48" rx="6" fill="rgba(69,26,3,0.4)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="450" y="620" fill="white" font-size="11" font-weight="600" text-anchor="middle">Left DC Motor</text>
  <text x="450" y="638" fill="#94a3b8" font-size="8" text-anchor="middle">JGA25-370 · 100 RPM · 12V</text>

  <!-- Right Motor -->
  <rect x="620" y="600" width="180" height="48" rx="6" fill="rgba(69,26,3,0.4)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="710" y="620" fill="white" font-size="11" font-weight="600" text-anchor="middle">Right DC Motor</text>
  <text x="710" y="638" fill="#94a3b8" font-size="8" text-anchor="middle">JGA25-370 · 100 RPM · 12V</text>

  <!-- PWM → Left Motor -->
  <line x1="260" y1="605" x2="358" y2="624" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <!-- PWM → Right Motor -->
  <line x1="260" y1="615" x2="618" y2="624" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- ========== LEGEND ========== -->
  <rect x="740" y="75" width="220" height="185" rx="8" fill="rgba(15,23,42,0.6)" stroke="#1e293b" stroke-width="1"/>
  <text x="850" y="95" fill="white" font-size="11" font-weight="600" text-anchor="middle">Legend</text>

  <rect x="755" y="108" width="16" height="10" rx="2" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="1"/>
  <text x="780" y="116" fill="#94a3b8" font-size="9">Perception (OpenMV)</text>

  <rect x="755" y="126" width="16" height="10" rx="2" fill="rgba(6,78,59,0.6)" stroke="#34d399" stroke-width="1"/>
  <text x="780" y="134" fill="#94a3b8" font-size="9">Control (STM32)</text>

  <rect x="755" y="144" width="16" height="10" rx="2" fill="rgba(30,27,75,0.6)" stroke="#a78bfa" stroke-width="1"/>
  <text x="780" y="152" fill="#94a3b8" font-size="9">Sensors</text>

  <rect x="755" y="162" width="16" height="10" rx="2" fill="rgba(59,7,100,0.6)" stroke="#c084fc" stroke-width="1"/>
  <text x="780" y="170" fill="#94a3b8" font-size="9">Communication</text>

  <rect x="755" y="180" width="16" height="10" rx="2" fill="rgba(69,26,3,0.6)" stroke="#fbbf24" stroke-width="1"/>
  <text x="780" y="188" fill="#94a3b8" font-size="9">Actuation</text>

  <rect x="755" y="198" width="16" height="10" rx="2" fill="rgba(15,23,42,0.6)" stroke="#94a3b8" stroke-width="1"/>
  <text x="780" y="206" fill="#94a3b8" font-size="9">External</text>

  <line x1="755" y1="222" x2="771" y2="222" stroke="#c084fc" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="780" y="225" fill="#94a3b8" font-size="9">Wireless Link</text>

  <line x1="755" y1="238" x2="771" y2="238" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="780" y="241" fill="#94a3b8" font-size="9">Data Flow</text>
</svg>